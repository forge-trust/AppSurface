    </linearGradient>
    <linearGradient id="violet" x1="133" y1="188" x2="410" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#9B5CFF"/>
    </linearGradient>
    <linearGradient id="fold" x1="365" y1="69" x2="452" y2="129" gradientUnits="userSpaceOnUse">
