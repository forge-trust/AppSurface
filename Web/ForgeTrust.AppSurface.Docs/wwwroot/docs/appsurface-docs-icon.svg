<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">AppSurface layered document mark</title>
  <desc id="desc">Four rounded isometric document layers in navy, blue, teal, and violet with document lines and a folded corner.</desc>
  <defs>
    <linearGradient id="base" x1="116" y1="386" x2="397" y2="247" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05112A"/>
      <stop offset="1" stop-color="#0D182A"/>
    </linearGradient>
    <linearGradient id="blue" x1="117" y1="329" x2="394" y2="187" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0074FF"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="teal" x1="113" y1="259" x2="390" y2="117" gradientUnits="userSpaceOnUse">
