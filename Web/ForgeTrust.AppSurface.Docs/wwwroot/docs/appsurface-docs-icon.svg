    </filter>
    <filter id="glow" x="46" y="26" width="420" height="332" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" values="0 0 0 0 0.145 0 0 0 0 0.388 0 0 0 0 0.922 0 0 0 .24 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>

