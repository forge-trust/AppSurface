name: Coverage Watchdog Process Tree

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/coverage-watchdog-process-tree.yml'
      - 'Cli/ForgeTrust.AppSurface.Cli/**'
      - 'Cli/ForgeTrust.AppSurface.Cli.Tests/**'
      - 'Directory.Packages.props'
      - 'packages.lock.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  process-tree:
    name: Coverage watchdog tree cleanup (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            10.0.x

      - name: Verify nested process-tree cleanup
        run: dotnet test Cli/ForgeTrust.AppSurface.Cli.Tests/ForgeTrust.AppSurface.Cli.Tests.csproj --filter FullyQualifiedName~CliWrapCoverageRunProcessRunner_ShouldCancelAndKillProcessTree --logger "console;verbosity=normal"
