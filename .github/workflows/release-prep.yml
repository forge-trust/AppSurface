name: Release Prep

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v.
        required: true
      date:
        description: Release date in YYYY-MM-DD form.
        required: true
      base-ref:
        description: Branch or ref to prepare from.
        required: false
        default: main
  pull_request:
    paths:
      - CHANGELOG.md
      - releases/**
      - packages/package-index.yml
      - tools/ForgeTrust.AppSurface.Release/**
      - eng/release
      - .github/workflows/release-prep.yml

concurrency:
  group: release-prep-${{ github.event.inputs.version || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    if: ${{ github.event_name == 'workflow_dispatch' && github.repository == 'forge-trust/AppSurface' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Validate release bot token
        env:
          RELEASE_BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_BOT_TOKEN}" ]]; then
            echo "RELEASE_BOT_TOKEN is required so release preparation can push a branch and open a pull request." >&2
            exit 1
          fi

      - name: Checkout base
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.base-ref }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BOT_TOKEN }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: |
            10.0.x

      - name: Verify base is current
        env:
          BASE_REF: ${{ inputs.base-ref }}
        run: |
          set -euo pipefail
          git fetch origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          expected_base="$(git rev-parse "origin/${BASE_REF}")"
          actual_head="$(git rev-parse HEAD)"
          if [[ "${actual_head}" != "${expected_base}" ]]; then
            echo "Release prep must run from the current origin/${BASE_REF} commit. HEAD=${actual_head}; origin/${BASE_REF}=${expected_base}." >&2
            exit 1
          fi

      - name: Prepare release files
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_DATE: ${{ inputs.date }}
        run: |
          set -euo pipefail
          ./eng/release prepare \
            --version "${VERSION}" \
            --date "${RELEASE_DATE}" \
            --report "${RUNNER_TEMP}/release-prep-report.md"

      - name: Create release pull request
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          VERSION: ${{ inputs.version }}
          BASE_REF: ${{ inputs.base-ref }}
        run: |
          set -euo pipefail
          branch="release/v${VERSION}"
          git config user.name "appsurface-release-bot"
          git config user.email "appsurface-release-bot@users.noreply.github.com"
          git checkout -b "${branch}"
          git add CHANGELOG.md releases packages/package-index.yml
          git commit -m "chore(release): prepare v${VERSION}"
          git push --force-with-lease origin "${branch}"
          existing_pr="$(gh pr list --head "${branch}" --json number --jq '.[0].number // ""')"
          if [[ -n "${existing_pr}" ]]; then
            gh pr edit "${existing_pr}" --title "chore(release): prepare v${VERSION}" --body-file "${RUNNER_TEMP}/release-prep-report.md"
          else
            gh pr create \
              --base "${BASE_REF}" \
              --head "${branch}" \
              --title "chore(release): prepare v${VERSION}" \
              --body-file "${RUNNER_TEMP}/release-prep-report.md"
          fi

  release-prep-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout pull request
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: |
            10.0.x

      - name: Recompute release warnings
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"
          mapfile -t release_artifact_changes < <(git diff --no-renames --name-status "origin/${GITHUB_BASE_REF}...HEAD" -- \
            ':(glob)releases/v*.md' \
            ':(glob)releases/v*.md.yml' \
            ':(glob)releases/v*.release.json' \
            ':(glob)releases/v*.evidence.json')
          if [[ "${#release_artifact_changes[@]}" -eq 0 ]]; then
            echo "No versioned release artifacts changed; validating release tooling instead."
            dotnet test tools/ForgeTrust.AppSurface.Release.Tests/ForgeTrust.AppSurface.Release.Tests.csproj
            exit 0
          fi
          mapfile -t release_artifact_deletions < <(printf '%s\n' "${release_artifact_changes[@]}" | awk '$1 == "D" { print $2 }')
          mapfile -t release_artifacts < <(git diff --no-renames --name-only --diff-filter=AM "origin/${GITHUB_BASE_REF}...HEAD" -- \
            ':(glob)releases/v*.md' \
            ':(glob)releases/v*.md.yml' \
            ':(glob)releases/v*.release.json' \
            ':(glob)releases/v*.evidence.json')

          mapfile -t manifests < <(git diff --no-renames --name-only --diff-filter=AM "origin/${GITHUB_BASE_REF}...HEAD" -- ':(glob)releases/v*.release.json')
          if [[ "${#manifests[@]}" -ne 1 ]]; then
            echo "Expected exactly one added or modified release manifest in this release preparation pull request; found ${#manifests[@]}." >&2
            exit 1
          fi
          mapfile -t evidence_files < <(git diff --no-renames --name-only --diff-filter=AM "origin/${GITHUB_BASE_REF}...HEAD" -- ':(glob)releases/v*.evidence.json')
          if [[ "${#evidence_files[@]}" -ne 1 ]]; then
            echo "Expected exactly one added or modified release evidence bundle in this release preparation pull request; found ${#evidence_files[@]}." >&2
            exit 1
          fi
          manifest="${manifests[0]}"
          version="$(jq -r '.version' "${manifest}")"
          expected_evidence="releases/v${version}.evidence.json"
          if [[ "${evidence_files[0]}" != "${expected_evidence}" ]]; then
            echo "Release evidence bundle ${evidence_files[0]} does not match release manifest version ${version}; expected ${expected_evidence}." >&2
            exit 1
          fi
          expected_artifacts=(
            "releases/v${version}.md"
            "releases/v${version}.md.yml"
            "releases/v${version}.release.json"
            "releases/v${version}.evidence.json"
          )
          if [[ "${#release_artifact_deletions[@]}" -ne 0 ]]; then
            allowed_release_artifact_deletions=()
            if [[ "${version}" == "0.1.0" ]]; then
              allowed_release_artifact_deletions=(
                "releases/v0.1.0-rc.1.md"
                "releases/v0.1.0-rc.1.md.yml"
                "releases/v0.1.0-rc.1.release.json"
                "releases/v0.1.0-rc.2.md"
                "releases/v0.1.0-rc.2.md.yml"
                "releases/v0.1.0-rc.2.release.json"
                "releases/v0.1.0-rc.3.evidence.json"
                "releases/v0.1.0-rc.3.md"
                "releases/v0.1.0-rc.3.md.yml"
                "releases/v0.1.0-rc.3.release.json"
                "releases/v0.1.0-rc.4.evidence.json"
                "releases/v0.1.0-rc.4.md"
                "releases/v0.1.0-rc.4.md.yml"
                "releases/v0.1.0-rc.4.release.json"
              )
            fi
            for deleted_release_artifact in "${release_artifact_deletions[@]}"; do
              if printf '%s\n' "${allowed_release_artifact_deletions[@]}" | grep -Fxq "${deleted_release_artifact}"; then
                continue
              fi
              echo "Unexpected versioned release artifact deletion ${deleted_release_artifact}; release preparation pull requests may only delete explicitly allowed superseded artifacts." >&2
              exit 1
            done
          fi
          mapfile -t sorted_release_artifacts < <(printf '%s\n' "${release_artifacts[@]}" | sort)
          mapfile -t sorted_expected_artifacts < <(printf '%s\n' "${expected_artifacts[@]}" | sort)
          for expected_artifact in "${sorted_expected_artifacts[@]}"; do
            if ! printf '%s\n' "${sorted_release_artifacts[@]}" | grep -Fxq "${expected_artifact}"; then
              echo "Release preparation pull requests must change the generated artifact ${expected_artifact}; found: ${sorted_release_artifacts[*]}." >&2
              exit 1
            fi
          done
          for artifact in "${sorted_release_artifacts[@]}"; do
            if printf '%s\n' "${sorted_expected_artifacts[@]}" | grep -Fxq "${artifact}"; then
              continue
            fi
            echo "Release preparation pull requests must change exactly the four generated artifacts for v${version}; found: ${sorted_release_artifacts[*]}." >&2
            exit 1
          done
          if [[ "${version}" != *-* ]]; then
            evidence_path="releases/v${version}.evidence.json"
            docs_exact_tree_path="$(jq -r '.docsArchive.exactTreePath // ""' "${evidence_path}")"
            docs_release_manifest_sha256="$(jq -r '.docsArchive.releaseManifestSha256 // ""' "${evidence_path}")"
            if [[ -z "${docs_exact_tree_path}" || -z "${docs_release_manifest_sha256}" ]]; then
              echo "Stable release evidence must include docsArchive.exactTreePath and docsArchive.releaseManifestSha256 before release-prep review." >&2
              exit 1
            fi

            normalized_exact_tree_path="${docs_exact_tree_path#./}"
            case "${normalized_exact_tree_path}" in
              ""|/*|../*|*/../*|*/..|"."|".."|.*|*/.*|*//*)
                echo "Stable docs exactTreePath '${docs_exact_tree_path}' must be a trusted-root-relative path with no parent, hidden, or empty segments." >&2
                exit 1
                ;;
            esac

            docs_release_root="${RUNNER_TEMP}/appsurface-release-prep-docs-${version}"
            docs_exact_tree="${docs_release_root}/${normalized_exact_tree_path}"
            mkdir -p "$(dirname "${docs_exact_tree}")"

            dotnet run --project Cli/ForgeTrust.AppSurface.Cli/ForgeTrust.AppSurface.Cli.csproj -c Release -- \
              docs export \
              --repo . \
              --mode cdn \
              --output "${docs_exact_tree}" \
              --public-origin https://forge-trust.com \
              --startup-timeout-seconds 30 \
              --strict

            jq -n \
              --arg version "${version}" \
              --arg exactTreePath "${docs_exact_tree_path}" \
              --arg releaseManifestSha256 "${docs_release_manifest_sha256}" \
              '{
                recommendedVersion: $version,
                versions: [
                  {
                    version: $version,
                    label: $version,
                    summary: ("Stable AppSurface release " + $version),
                    exactTreePath: $exactTreePath,
                    releaseManifestSha256: $releaseManifestSha256,
                    supportState: "Current",
                    visibility: "Public",
                    advisoryState: "None"
                  }
                ]
              }' > "${docs_release_root}/versions.json"

            dotnet run --project Cli/ForgeTrust.AppSurface.Cli/ForgeTrust.AppSurface.Cli.csproj -c Release -- \
              docs verify-archive \
              --catalog "${docs_release_root}/versions.json" \
              --version "${version}" \
              --trusted-release-root "${docs_release_root}"

            ./eng/release check \
              --version "${version}" \
              --fail-on-warnings \
              --allow-existing-targets \
              --docs-catalog "${docs_release_root}/versions.json" \
              --docs-trusted-release-root "${docs_release_root}"
          else
            ./eng/release check --version "${version}" --fail-on-warnings --allow-existing-targets
          fi
