name: VCS Ignore Parity

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/vcs-ignore-parity.yml'
      - 'Web/ForgeTrust.AppSurface.Docs/**'
      - 'Web/ForgeTrust.AppSurface.Docs.Tests/**'
      - 'Directory.Packages.props'
      - 'packages.lock.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    name: VCS ignore parity (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: |
            10.0.x

      - name: Verify Tailwind runtime resolution can be disabled
        run: dotnet build Web/ForgeTrust.AppSurface.Web.Tailwind/runtimes/ForgeTrust.AppSurface.Web.Tailwind.Runtime.linux-x64.csproj /p:TailwindRuntimeBinaryResolutionEnabled=false

      - name: Run VCS ignore parity tests
        run: dotnet test Web/ForgeTrust.AppSurface.Docs.Tests/ForgeTrust.AppSurface.Docs.Tests.csproj --filter AppSurfaceDocsHarvestVcsIgnorePolicyTests --logger "console;verbosity=normal"
