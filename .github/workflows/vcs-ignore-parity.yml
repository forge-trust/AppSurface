name: VCS Ignore Parity

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/vcs-ignore-parity.yml'
      - 'Web/ForgeTrust.AppSurface.Docs/**'
      - 'Web/ForgeTrust.AppSurface.Docs.Tests/**'
      - 'Directory.Packages.props'
      - 'packages.lock.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    name: VCS ignore parity (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: |
            10.0.x

      - name: Run VCS ignore parity tests
        run: dotnet test Web/ForgeTrust.AppSurface.Docs.Tests/ForgeTrust.AppSurface.Docs.Tests.csproj --filter AppSurfaceDocsHarvestVcsIgnorePolicyTests --logger "console;verbosity=normal"
