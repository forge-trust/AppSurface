name: Code Quality

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: code-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dotnet-format:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        id: setup-dotnet
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: |
            10.0.x
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/packages.*.lock.json

      - name: Restore packages (locked, cache-aware)
        run: |
          start_seconds="$(date +%s)"
          dotnet nuget locals global-packages --list
          dotnet restore ForgeTrust.AppSurface.slnx --locked-mode
          restore_seconds="$(( $(date +%s) - start_seconds ))"
          package_size="$(du -sh "$NUGET_PACKAGES" 2>/dev/null | cut -f1 || true)"

          {
            echo "### NuGet cache summary"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Workflow job | code-quality.yml / dotnet-format |"
            echo "| Cache hit | ${{ steps.setup-dotnet.outputs.cache-hit }} |"
            echo "| Cache dependency path | \`**/packages.lock.json\`, \`**/packages.*.lock.json\` |"
            echo "| NUGET_PACKAGES | \`$NUGET_PACKAGES\` |"
            echo "| Package folder size | ${package_size:-unknown} |"
            echo "| Locked restore duration | ${restore_seconds}s |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build project
        run: dotnet build ForgeTrust.AppSurface.slnx --configuration Release --no-restore

      - name: Verify generated package chooser
        run: dotnet run --project tools/ForgeTrust.AppSurface.PackageIndex/ForgeTrust.AppSurface.PackageIndex.csproj --configuration Release --no-build --no-restore -- verify

      - name: Verify generated Markdown snippets
        run: dotnet run --project tools/ForgeTrust.AppSurface.MarkdownSnippets/ForgeTrust.AppSurface.MarkdownSnippets.csproj --configuration Release --no-build --no-restore -- verify

      - name: Verify formatting
        run: dotnet format ForgeTrust.AppSurface.slnx --verify-no-changes --no-restore --verbosity diagnostic
