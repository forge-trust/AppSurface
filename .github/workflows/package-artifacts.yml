name: Package Artifacts

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      package-version:
        description: Exact prerelease package version to pack and validate.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: package-artifacts-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.head.label || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  package-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TailwindRuntimeBinaryResolutionEnabled: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: |
            10.0.x

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: Web/pnpm-lock.yaml

      - name: Verify web assets
        run: |
          pnpm --dir Web install --frozen-lockfile
          pnpm --dir Web run assets:typecheck
          pnpm --dir Web run assets:test
          pnpm --dir Web run assets:verify

      - name: Verify package artifacts
        env:
          PACKAGE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs['package-version'] || format('0.0.0-ci.{0}', github.run_number) }}
        run: |
          dotnet run --project tools/ForgeTrust.AppSurface.PackageIndex/ForgeTrust.AppSurface.PackageIndex.csproj -- \
            verify-packages \
            --package-version "$PACKAGE_VERSION" \
            --artifacts-output "$RUNNER_TEMP/package-artifacts" \
            --artifact-manifest "$RUNNER_TEMP/package-artifacts/package-artifact-manifest.json" \
            --report "$RUNNER_TEMP/package-artifacts/package-validation-report.md"

      - name: Upload package validation diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: appsurface-package-validation-diagnostics-${{ github.event_name == 'workflow_dispatch' && inputs['package-version'] || format('0.0.0-ci.{0}', github.run_number) }}
          path: |
            ${{ runner.temp }}/package-artifacts/package-validation-report.md
            ${{ runner.temp }}/package-artifacts/coverage-cli-consumer-proof.md
            ${{ runner.temp }}/package-artifacts/coverage-cli-consumer-proof/NuGet.tool.config
            ${{ runner.temp }}/package-artifacts/coverage-cli-consumer-proof/consumer/NuGet.config
            ${{ runner.temp }}/package-artifacts/coverage-cli-consumer-proof/consumer/.config/dotnet-tools.json
            ${{ runner.temp }}/package-artifacts/coverage-cli-consumer-proof/consumer/TestResults/**
            ${{ runner.temp }}/package-artifacts/coverage-cli-consumer-proof/logs/**
          if-no-files-found: warn

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: appsurface-package-artifacts-${{ github.event_name == 'workflow_dispatch' && inputs['package-version'] || format('0.0.0-ci.{0}', github.run_number) }}
          path: ${{ runner.temp }}/package-artifacts
