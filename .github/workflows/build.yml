name: build.yml

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.gitattributes'
      - '**/*.gitignore'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.head.label || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  coverage-security-platform:
    name: Coverage security contracts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            10.0.x
          cache: true
          cache-dependency-path: |
            Cli/ForgeTrust.AppSurface.Cli.Tests/packages.lock.json

      - name: Restore coverage security tests (locked)
        run: dotnet restore Cli/ForgeTrust.AppSurface.Cli.Tests/ForgeTrust.AppSurface.Cli.Tests.csproj --locked-mode

      - name: Run coverage security contracts
        run: >-
          dotnet test Cli/ForgeTrust.AppSurface.Cli.Tests/ForgeTrust.AppSurface.Cli.Tests.csproj
          --configuration Release
          --no-restore
          --filter "FullyQualifiedName~CoverageRunArtifactReaderTests|FullyQualifiedName~CoverageRunOutputGuardSecurityTests"

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CODECOV_TOKEN_PRESENT: ${{ secrets.CODECOV_TOKEN != '' }}
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 1 }}

      - name: Setup .NET SDK
        id: setup-dotnet
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            10.0.x
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/packages.*.lock.json

      - name: Restore .NET packages (locked, cache-aware)
        run: |
          start_seconds="$(date +%s)"
          dotnet nuget locals global-packages --list
          dotnet restore ForgeTrust.AppSurface.slnx --locked-mode
          restore_seconds="$(( $(date +%s) - start_seconds ))"
          package_size="$(du -sh "$NUGET_PACKAGES" 2>/dev/null | cut -f1 || true)"

          {
            echo "### NuGet cache summary"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Workflow job | build.yml / build |"
            echo "| Cache hit | ${{ steps.setup-dotnet.outputs.cache-hit }} |"
            echo "| Cache dependency path | \`**/packages.lock.json\`, \`**/packages.*.lock.json\` |"
            echo "| NUGET_PACKAGES | \`$NUGET_PACKAGES\` |"
            echo "| Package folder size | ${package_size:-unknown} |"
            echo "| Locked restore duration | ${restore_seconds}s |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: Web/pnpm-lock.yaml

      - name: Test dormant release-contract classifier
        run: node --experimental-test-coverage --test-coverage-lines=100 --test-coverage-functions=100 --test-coverage-branches=100 --test .github/scripts/release-contract-v1.test.mjs

      - name: Verify generated package chooser
        run: |
          dotnet run --project tools/ForgeTrust.AppSurface.PackageIndex/ForgeTrust.AppSurface.PackageIndex.csproj --configuration Release --no-restore -- verify

      - name: Verify generated Markdown snippets
        run: |
          dotnet run --project tools/ForgeTrust.AppSurface.MarkdownSnippets/ForgeTrust.AppSurface.MarkdownSnippets.csproj --configuration Release --no-restore -- verify
          dotnet run --project tools/ForgeTrust.AppSurface.MarkdownSnippets/ForgeTrust.AppSurface.MarkdownSnippets.csproj --configuration Release --no-restore -- verify --document Durable/ForgeTrust.AppSurface.Durable/README.md
          dotnet run --project tools/ForgeTrust.AppSurface.MarkdownSnippets/ForgeTrust.AppSurface.MarkdownSnippets.csproj --configuration Release --no-restore -- verify --document Durable/ForgeTrust.AppSurface.Durable.PostgreSql/README.md
          dotnet run --project tools/ForgeTrust.AppSurface.MarkdownSnippets/ForgeTrust.AppSurface.MarkdownSnippets.csproj --configuration Release --no-restore -- verify --document Web/ForgeTrust.AppSurface.Web/README.md

      - name: Verify packed Durable consumers
        run: ./Durable/verify-packed-consumers.sh

      - name: Verify web assets
        run: |
          pnpm --dir Web install --frozen-lockfile
          pnpm --dir Web run assets:typecheck
          pnpm --dir Web run assets:test
          pnpm --dir Web run assets:build
          pnpm --dir Web run assets:verify

      - name: Run solution coverage and gate
        env:
          BUILD_CONFIGURATION: Release
          BUILD_NO_RESTORE: true
          COVERAGE_PARALLELISM: 2
          COVERAGE_GATE_DIFF_BASE: ${{ github.event_name == 'pull_request' && 'HEAD^1' || '' }}
        run: |
          ./scripts/coverage-solution.sh

      - name: Upload slow-test diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() && !cancelled() }}
        with:
          name: slow-test-diagnostics
          path: |
            TestResults/coverage-merged/slow-test-diagnostics.md
            TestResults/coverage-merged/slow-test-diagnostics.json
          if-no-files-found: warn

      - name: Publish slow-test diagnostics summary
        if: ${{ always() && !cancelled() }}
        run: |
          diagnostics_markdown="TestResults/coverage-merged/slow-test-diagnostics.md"
          if [[ -f "$diagnostics_markdown" ]]; then
            cat "$diagnostics_markdown" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Slow-test diagnostics"
              echo
              echo "No slow-test diagnostics Markdown artifact was generated."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: ${{ always() && !cancelled() && env.CODECOV_TOKEN_PRESENT == 'true' }}
        with:
          files: 'TestResults/coverage-merged/coverage.cobertura.xml'
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: ${{ always() && !cancelled() && env.CODECOV_TOKEN_PRESENT == 'true' }}
        with:
          files: 'TestResults/coverage-merged/junit-*.xml'
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}

  export-appsurface-docs:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup .NET SDK
        id: setup-dotnet
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            10.0.x
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/packages.*.lock.json

      - name: Restore AppSurface CLI packages (locked, cache-aware)
        run: |
          start_seconds="$(date +%s)"
          dotnet nuget locals global-packages --list
          dotnet restore Cli/ForgeTrust.AppSurface.Cli/ForgeTrust.AppSurface.Cli.csproj --locked-mode
          restore_seconds="$(( $(date +%s) - start_seconds ))"
          package_size="$(du -sh "$NUGET_PACKAGES" 2>/dev/null | cut -f1 || true)"

          {
            echo "### NuGet cache summary"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Workflow job | build.yml / export-appsurface-docs |"
            echo "| Cache hit | ${{ steps.setup-dotnet.outputs.cache-hit }} |"
            echo "| Cache dependency path | \`**/packages.lock.json\`, \`**/packages.*.lock.json\` |"
            echo "| NUGET_PACKAGES | \`$NUGET_PACKAGES\` |"
            echo "| Package folder size | ${package_size:-unknown} |"
            echo "| Locked restore duration | ${restore_seconds}s |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build AppSurface CLI (Release)
        run: |
          dotnet build Cli/ForgeTrust.AppSurface.Cli/ForgeTrust.AppSurface.Cli.csproj -c Release --no-restore

      - name: Verify AppSurface Docs harvest health
        env:
          AppSurfaceDocs__Harvest__JavaScript__IncludeGlobs__0: Web/ForgeTrust.RazorWire/assets/contracts/razorwire-public-contracts.js
        run: |
          dotnet run --project Cli/ForgeTrust.AppSurface.Cli/ForgeTrust.AppSurface.Cli.csproj -c Release --no-build --no-restore -- \
            docs verify-health \
            --repo . \
            --require-complete-event-doclets \
            --environment Production \
            --startup-timeout-seconds 30

      - name: Export AppSurface Docs static site with CDN validation
        env:
          AppSurfaceDocs__Contributor__DefaultBranch: ${{ github.head_ref || github.ref_name }}
          AppSurfaceDocs__Contributor__SourceRef: ${{ github.sha }}
          AppSurfaceDocs__Contributor__SourceUrlTemplate: https://github.com/${{ github.repository }}/blob/{branch}/{path}
          AppSurfaceDocs__Contributor__SymbolSourceUrlTemplate: https://github.com/${{ github.repository }}/blob/{ref}/{path}#L{line}
          AppSurfaceDocs__Contributor__EditUrlTemplate: https://github.com/${{ github.repository }}/edit/{branch}/{path}
          AppSurfaceDocs__Contributor__LastUpdatedMode: Git
          AppSurfaceDocs__Identity__DisplayName: AppSurface
          AppSurfaceDocs__Identity__Wordmark__HighlightText: Surface
          AppSurfaceDocs__Identity__Wordmark__HighlightColor: "#3b82f6"
          AppSurfaceDocs__Identity__BrandingAssets__DirectoryPath: branding
          AppSurfaceDocs__Identity__BrandingAssets__AllowSvgAssets: "true"
          AppSurfaceDocs__Identity__Logo__Path: /branding/appsurface-site-icon.svg
          AppSurfaceDocs__Identity__Favicon__SvgPath: /branding/appsurface-site-icon.svg
          AppSurfaceDocs__Harvest__JavaScript__IncludeGlobs__0: Web/ForgeTrust.RazorWire/assets/contracts/razorwire-public-contracts.js
        run: |
          printf '%s\n' '/' '/docs' > "$RUNNER_TEMP/appsurface-docs-seeds.txt"
          # CI docs export can spend just over 10s in cold host startup while generating the first harvest snapshot.
          dotnet run --project Cli/ForgeTrust.AppSurface.Cli/ForgeTrust.AppSurface.Cli.csproj -c Release --no-build --no-restore -- \
            docs export \
            --repo . \
            --mode cdn \
            --seeds "$RUNNER_TEMP/appsurface-docs-seeds.txt" \
            --output "$RUNNER_TEMP/appsurface-docs-pages" \
            --public-origin https://forge-trust.com \
            --startup-timeout-seconds 30 \
            --strict

      - name: Hydrate release-pinned docs archives
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PAGES_ROOT: ${{ runner.temp }}/appsurface-docs-pages
        run: |
          set -euo pipefail
          assets_root="${RUNNER_TEMP}/appsurface-release-docs-assets"
          mkdir -p "${assets_root}" "${PAGES_ROOT}/releases"
          mapfile -t release_rows < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" \
              --jq '.[] | select(.draft | not) | [.tag_name, .prerelease] | @tsv'
          )
          if [[ "${#release_rows[@]}" -eq 0 ]]; then
            exit 0
          fi
          catalog_entries="${RUNNER_TEMP}/appsurface-release-docs-catalog.jsonl"
          : > "${catalog_entries}"
          for release_row in "${release_rows[@]}"; do
            IFS=$'\t' read -r release_tag _is_prerelease <<< "${release_row}"
            version="${release_tag#v}"
            asset_name="appsurface-docs-v${version}.tar.gz"
            asset_dir="${assets_root}/${version}"
            exact_tree="${PAGES_ROOT}/releases/${version}"
            mkdir -p "${asset_dir}" "${exact_tree}"
            if ! gh release download "${release_tag}" --pattern "${asset_name}" --dir "${asset_dir}" --clobber; then
              echo "No release docs archive asset found for ${release_tag}; skipping." >&2
              continue
            fi
            if tar -tzf "${asset_dir}/${asset_name}" | grep -Eq '(^/|(^|/)\.\.(/|$))'; then
              echo "Release docs archive ${asset_name} contains an unsafe absolute or parent-relative entry." >&2
              exit 1
            fi
            if ! tar -tzvf "${asset_dir}/${asset_name}" | awk '{ kind = substr($1, 1, 1); if (kind != "-" && kind != "d") exit 1 }'; then
              echo "Release docs archive ${asset_name} contains a non-regular tar entry." >&2
              exit 1
            fi
            rm -rf "${exact_tree}"
            mkdir -p "${exact_tree}"
            tar -xzf "${asset_dir}/${asset_name}" -C "${exact_tree}"
            manifest="${exact_tree}/.appsurface-docs-release-manifest.json"
            if [[ ! -f "${manifest}" ]]; then
              echo "Release docs archive ${asset_name} did not contain .appsurface-docs-release-manifest.json." >&2
              exit 1
            fi
            manifest_sha256="$(sha256sum "${manifest}" | awk '{print $1}')"
            jq -nc \
              --arg version "${version}" \
              --arg exactTreePath "releases/${version}" \
              --arg releaseManifestSha256 "${manifest_sha256}" \
              '{version:$version,label:$version,summary:("AppSurface " + $version),supportState:"Maintained",visibility:"Public",advisoryState:"None",exactTreePath:$exactTreePath,releaseManifestSha256:$releaseManifestSha256}' \
              >> "${catalog_entries}"
          done
          if [[ -s "${catalog_entries}" ]]; then
            jq -s \
              'def semver_key: (.version | capture("^(?<major>[0-9]+)\\.(?<minor>[0-9]+)\\.(?<patch>[0-9]+)") | [.major,.minor,.patch] | map(tonumber));
               def stable_version: (.version | test("^(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)$"));
               (sort_by(semver_key) | reverse) as $versions |
               ($versions | map(select(stable_version)) | sort_by(semver_key) | reverse | first | .version // null) as $recommended |
               {schema:"appsurface-docs-version-catalog-v1",recommendedVersion:$recommended,versions:($versions | map(. + {supportState:(if .version == $recommended then "Current" else "Maintained" end)}))}' \
              "${catalog_entries}" > "${PAGES_ROOT}/versions.json"
          fi

      - name: Upload Pages artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ${{ runner.temp }}/appsurface-docs-pages
          include-hidden-files: true

  deploy-appsurface-docs:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: export-appsurface-docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
