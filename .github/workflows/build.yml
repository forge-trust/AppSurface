name: build.yml

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.gitattributes'
      - '**/*.gitignore'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.head.label || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CODECOV_TOKEN_PRESENT: ${{ secrets.CODECOV_TOKEN != '' }}
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        id: setup-dotnet
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: |
            10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore .NET packages (locked, cache-aware)
        run: |
          start_seconds="$(date +%s)"
          dotnet nuget locals global-packages --list
          dotnet restore ForgeTrust.AppSurface.slnx --locked-mode
          restore_seconds="$(( $(date +%s) - start_seconds ))"
          package_size="$(du -sh "$NUGET_PACKAGES" 2>/dev/null | cut -f1 || true)"

          {
            echo "### NuGet cache summary"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Workflow job | build.yml / build |"
            echo "| Cache hit | ${{ steps.setup-dotnet.outputs.cache-hit }} |"
            echo "| Cache dependency path | \`**/packages.lock.json\` |"
            echo "| NUGET_PACKAGES | \`$NUGET_PACKAGES\` |"
            echo "| Package folder size | ${package_size:-unknown} |"
            echo "| Locked restore duration | ${restore_seconds}s |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: Web/pnpm-lock.yaml

      - name: Verify generated package chooser
        run: |
          dotnet run --project tools/ForgeTrust.AppSurface.PackageIndex/ForgeTrust.AppSurface.PackageIndex.csproj --configuration Release --no-restore -- verify

      - name: Verify generated Markdown snippets
        run: |
          dotnet run --project tools/ForgeTrust.AppSurface.MarkdownSnippets/ForgeTrust.AppSurface.MarkdownSnippets.csproj --configuration Release --no-restore -- verify

      - name: Verify web assets
        run: |
          pnpm --dir Web install --frozen-lockfile
          pnpm --dir Web run assets:typecheck
          pnpm --dir Web run assets:test
          pnpm --dir Web run assets:build
          pnpm --dir Web run assets:verify

      - name: Run solution coverage
        env:
          BUILD_CONFIGURATION: Release
          BUILD_NO_RESTORE: true
        run: |
          ./scripts/coverage-solution.sh

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        if: ${{ always() && !cancelled() && env.CODECOV_TOKEN_PRESENT == 'true' }}
        with:
          files: 'TestResults/coverage-merged/coverage.cobertura.xml'
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        if: ${{ always() && !cancelled() && env.CODECOV_TOKEN_PRESENT == 'true' }}
        with:
          files: 'TestResults/coverage-merged/junit-*.xml'
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}

  export-appsurface-docs:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup .NET SDK
        id: setup-dotnet
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: |
            10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore AppSurface CLI packages (locked, cache-aware)
        run: |
          start_seconds="$(date +%s)"
          dotnet nuget locals global-packages --list
          dotnet restore Cli/ForgeTrust.AppSurface.Cli/ForgeTrust.AppSurface.Cli.csproj --locked-mode
          restore_seconds="$(( $(date +%s) - start_seconds ))"
          package_size="$(du -sh "$NUGET_PACKAGES" 2>/dev/null | cut -f1 || true)"

          {
            echo "### NuGet cache summary"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Workflow job | build.yml / export-appsurface-docs |"
            echo "| Cache hit | ${{ steps.setup-dotnet.outputs.cache-hit }} |"
            echo "| Cache dependency path | \`**/packages.lock.json\` |"
            echo "| NUGET_PACKAGES | \`$NUGET_PACKAGES\` |"
            echo "| Package folder size | ${package_size:-unknown} |"
            echo "| Locked restore duration | ${restore_seconds}s |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build AppSurface CLI (Release)
        run: |
          dotnet build Cli/ForgeTrust.AppSurface.Cli/ForgeTrust.AppSurface.Cli.csproj -c Release --no-restore

      - name: Verify AppSurface Docs harvest health
        env:
          AppSurfaceDocs__Harvest__JavaScript__IncludeGlobs__0: Web/ForgeTrust.RazorWire/assets/contracts/razorwire-public-contracts.js
        run: |
          dotnet run --project Cli/ForgeTrust.AppSurface.Cli/ForgeTrust.AppSurface.Cli.csproj -c Release --no-build --no-restore -- \
            docs verify-health \
            --repo . \
            --require-complete-event-doclets \
            --environment Production \
            --startup-timeout-seconds 30

      - name: Export AppSurface Docs static site with CDN validation
        env:
          AppSurfaceDocs__Contributor__DefaultBranch: ${{ github.head_ref || github.ref_name }}
          AppSurfaceDocs__Contributor__SourceRef: ${{ github.sha }}
          AppSurfaceDocs__Contributor__SourceUrlTemplate: https://github.com/${{ github.repository }}/blob/{branch}/{path}
          AppSurfaceDocs__Contributor__SymbolSourceUrlTemplate: https://github.com/${{ github.repository }}/blob/{ref}/{path}#L{line}
          AppSurfaceDocs__Contributor__EditUrlTemplate: https://github.com/${{ github.repository }}/edit/{branch}/{path}
          AppSurfaceDocs__Contributor__LastUpdatedMode: Git
          AppSurfaceDocs__Identity__DisplayName: AppSurface
          AppSurfaceDocs__Identity__Wordmark__HighlightText: Surface
          AppSurfaceDocs__Identity__Wordmark__HighlightColor: "#3b82f6"
          AppSurfaceDocs__Identity__BrandingAssets__DirectoryPath: branding
          AppSurfaceDocs__Identity__BrandingAssets__AllowSvgAssets: "true"
          AppSurfaceDocs__Identity__Logo__Path: /branding/appsurface-site-icon.svg
          AppSurfaceDocs__Identity__Favicon__SvgPath: /branding/appsurface-site-icon.svg
          AppSurfaceDocs__Harvest__JavaScript__IncludeGlobs__0: Web/ForgeTrust.RazorWire/assets/contracts/razorwire-public-contracts.js
        run: |
          printf '%s\n' '/' '/docs' > "$RUNNER_TEMP/appsurface-docs-seeds.txt"
          # CI docs export can spend just over 10s in cold host startup while generating the first harvest snapshot.
          dotnet run --project Cli/ForgeTrust.AppSurface.Cli/ForgeTrust.AppSurface.Cli.csproj -c Release --no-build --no-restore -- \
            docs export \
            --repo . \
            --mode cdn \
            --seeds "$RUNNER_TEMP/appsurface-docs-seeds.txt" \
            --output "$RUNNER_TEMP/appsurface-docs-pages" \
            --public-origin https://forge-trust.com \
            --startup-timeout-seconds 30 \
            --strict

      - name: Upload Pages artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ${{ runner.temp }}/appsurface-docs-pages

  deploy-appsurface-docs:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: export-appsurface-docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
