name: NuGet Stable Publish

on:
  push:
    tags:
      - 'v*.*.*'
      - '!v*.*.*-*'
      - '!v*.*.*.*'

concurrency:
  group: nuget-stable-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  STABLE_BASE_REF: main

jobs:
  validate-tag:
    if: ${{ github.repository == 'forge-trust/AppSurface' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      package-version: ${{ steps.tag.outputs.package-version }}
      tag-commit: ${{ steps.tag.outputs.tag-commit }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate stable tag
        id: tag
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          tag_pattern='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          if [[ ! "${tag_name}" =~ ${tag_pattern} ]]; then
            echo "Tag '${tag_name}' must match v<major>.<minor>.<patch> for stable publishing." >&2
            exit 1
          fi

          git fetch --force origin "refs/tags/${tag_name}:refs/tags/${tag_name}"
          tag_type="$(git cat-file -t "refs/tags/${tag_name}")"
          if [[ "${tag_type}" != "tag" ]]; then
            echo "Stable publish requires an annotated tag. '${tag_name}' is ${tag_type}." >&2
            exit 1
          fi

          tag_commit="$(git rev-parse "refs/tags/${tag_name}^{commit}")"
          git fetch origin "${STABLE_BASE_REF}:refs/remotes/origin/${STABLE_BASE_REF}"
          if ! git merge-base --is-ancestor "${tag_commit}" "origin/${STABLE_BASE_REF}"; then
            echo "Tag '${tag_name}' resolves to ${tag_commit}, which is not reachable from origin/${STABLE_BASE_REF}." >&2
            exit 1
          fi

          {
            echo "package-version=${tag_name#v}"
            echo "tag-commit=${tag_commit}"
          } >> "${GITHUB_OUTPUT}"

  validate-release-environment:
    needs: validate-tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: read

    steps:
      - name: Validate protected NuGet environments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if ! environment_json="$(gh api "repos/${GITHUB_REPOSITORY}/environments/nuget-stable")"; then
            echo "Environment 'nuget-stable' must exist before stable publishing can run." >&2
            exit 1
          fi

          required_reviewer_rules="$(jq '[.protection_rules[]? | select(.type == "required_reviewers")] | length' <<< "${environment_json}")"
          prevent_self_review_rules="$(jq '[.protection_rules[]? | select(.type == "required_reviewers" and .prevent_self_review == true)] | length' <<< "${environment_json}")"

          if [[ "${required_reviewer_rules}" -lt 1 ]]; then
            echo "Environment 'nuget-stable' must exist with required reviewers before stable publishing can run." >&2
            exit 1
          fi

          if [[ "${prevent_self_review_rules}" -lt 1 ]]; then
            echo "Environment 'nuget-stable' must prevent self-review before stable publishing can run." >&2
            exit 1
          fi

          if ! smoke_environment_json="$(gh api "repos/${GITHUB_REPOSITORY}/environments/nuget-stable-smoke")"; then
            echo "Environment 'nuget-stable-smoke' must exist before stable smoke install can run." >&2
            exit 1
          fi

          smoke_wait_timer_rules="$(jq '[.protection_rules[]? | select(.type == "wait_timer" and .wait_timer == 25)] | length' <<< "${smoke_environment_json}")"
          smoke_required_reviewer_rules="$(jq '[.protection_rules[]? | select(.type == "required_reviewers")] | length' <<< "${smoke_environment_json}")"

          if [[ "${smoke_wait_timer_rules}" -lt 1 ]]; then
            echo "Environment 'nuget-stable-smoke' must enforce a 25-minute wait timer before stable smoke install can run." >&2
            exit 1
          fi

          if [[ "${smoke_required_reviewer_rules}" -gt 0 ]]; then
            echo "Environment 'nuget-stable-smoke' must not require reviewers before stable smoke install can run." >&2
            exit 1
          fi

  validate-source-ci:
    needs: validate-tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Required so gh run list can verify source CI for the tag commit.
      actions: read
      contents: read

    steps:
      - name: Validate source workflows succeeded
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_COMMIT: ${{ needs.validate-tag.outputs.tag-commit }}
        run: |
          set -euo pipefail

          for workflow in build.yml package-gate.yml; do
            run_url="$(gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow "${workflow}" \
              --branch "${STABLE_BASE_REF}" \
              --commit "${TAG_COMMIT}" \
              --json conclusion,status,url \
              --jq '[.[] | select(.status == "completed" and .conclusion == "success")][0].url // ""')"

            if [[ -z "${run_url}" ]]; then
              echo "Required workflow '${workflow}' has no successful completed run for ${TAG_COMMIT} on ${STABLE_BASE_REF}." >&2
              exit 1
            fi

            echo "Validated ${workflow}: ${run_url}"
          done

  pack-and-verify:
    needs:
      - validate-tag
      - validate-source-ci
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout tag commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.validate-tag.outputs.tag-commit }}
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            10.0.x

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Verify web assets
        run: |
          pnpm --dir Web install --frozen-lockfile
          pnpm --dir Web run assets:typecheck
          pnpm --dir Web run assets:test
          pnpm --dir Web run assets:verify

      - name: Verify package artifacts
        env:
          PACKAGE_VERSION: ${{ needs.validate-tag.outputs.package-version }}
          PACKAGE_ARTIFACTS: ${{ runner.temp }}/package-artifacts
        run: |
          dotnet run --project tools/ForgeTrust.AppSurface.PackageIndex/ForgeTrust.AppSurface.PackageIndex.csproj -- \
            verify-packages \
            --package-version "${PACKAGE_VERSION}" \
            --artifacts-output "${PACKAGE_ARTIFACTS}" \
            --artifact-manifest "${PACKAGE_ARTIFACTS}/package-artifact-manifest.json" \
            --report "${PACKAGE_ARTIFACTS}/package-validation-report.md"

      - name: Upload package validation diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: appsurface-stable-validation-diagnostics-${{ needs.validate-tag.outputs.package-version }}
          path: |
            ${{ runner.temp }}/package-artifacts/package-validation-report.md
            ${{ runner.temp }}/package-artifacts/coverage-cli-consumer-proof.md
            ${{ runner.temp }}/package-artifacts/coverage-cli-consumer-proof/NuGet.tool.config
            ${{ runner.temp }}/package-artifacts/coverage-cli-consumer-proof/consumer/NuGet.config
            ${{ runner.temp }}/package-artifacts/coverage-cli-consumer-proof/consumer/.config/dotnet-tools.json
            ${{ runner.temp }}/package-artifacts/coverage-cli-consumer-proof/consumer/TestResults/**
            ${{ runner.temp }}/package-artifacts/coverage-cli-consumer-proof/logs/**
          if-no-files-found: warn

      - name: Upload validated package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: appsurface-stable-packages-${{ needs.validate-tag.outputs.package-version }}
          path: ${{ runner.temp }}/package-artifacts
          if-no-files-found: error

  prove-docs-archive:
    needs:
      - validate-tag
      - validate-source-ci
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout tag commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.validate-tag.outputs.tag-commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            10.0.x

      - name: Export and verify stable docs archive before NuGet publish
        env:
          PACKAGE_VERSION: ${{ needs.validate-tag.outputs.package-version }}
          AppSurfaceDocs__Contributor__DefaultBranch: ${{ env.STABLE_BASE_REF }}
          AppSurfaceDocs__Contributor__SourceRef: ${{ needs.validate-tag.outputs.tag-commit }}
          AppSurfaceDocs__Contributor__SourceUrlTemplate: https://github.com/${{ github.repository }}/blob/{branch}/{path}
          AppSurfaceDocs__Contributor__SymbolSourceUrlTemplate: https://github.com/${{ github.repository }}/blob/{ref}/{path}#L{line}
          AppSurfaceDocs__Contributor__EditUrlTemplate: https://github.com/${{ github.repository }}/edit/{branch}/{path}
          AppSurfaceDocs__Contributor__LastUpdatedMode: Git
          AppSurfaceDocs__Identity__DisplayName: AppSurface
          AppSurfaceDocs__Identity__Wordmark__HighlightText: Surface
          AppSurfaceDocs__Identity__Wordmark__HighlightColor: "#3b82f6"
          AppSurfaceDocs__Identity__BrandingAssets__DirectoryPath: branding
          AppSurfaceDocs__Identity__BrandingAssets__AllowSvgAssets: "true"
          AppSurfaceDocs__Identity__Logo__Path: /branding/appsurface-site-icon.svg
          AppSurfaceDocs__Identity__Favicon__SvgPath: /branding/appsurface-site-icon.svg
          AppSurfaceDocs__Harvest__JavaScript__IncludeGlobs__0: Web/ForgeTrust.RazorWire/assets/contracts/razorwire-public-contracts.js
        run: |
          set -euo pipefail

          evidence_path="releases/v${PACKAGE_VERSION}.evidence.json"
          docs_exact_tree_path="$(jq -r '.docsArchive.exactTreePath // ""' "${evidence_path}")"
          docs_release_manifest_sha256="$(jq -r '.docsArchive.releaseManifestSha256 // ""' "${evidence_path}")"
          if [[ -z "${docs_exact_tree_path}" || -z "${docs_release_manifest_sha256}" ]]; then
            echo "Stable release evidence must include docsArchive.exactTreePath and docsArchive.releaseManifestSha256 before NuGet publish." >&2
            exit 1
          fi

          normalized_exact_tree_path="${docs_exact_tree_path#./}"
          case "${normalized_exact_tree_path}" in
            ""|/*|../*|*/../*|*/..|"."|".."|.*|*/.*|*//*)
              echo "Stable docs exactTreePath '${docs_exact_tree_path}' must be a trusted-root-relative path with no parent, hidden, or empty segments." >&2
              exit 1
              ;;
          esac

          docs_release_root="${RUNNER_TEMP}/appsurface-stable-docs-${PACKAGE_VERSION}"
          docs_exact_tree="${docs_release_root}/${normalized_exact_tree_path}"
          mkdir -p "$(dirname "${docs_exact_tree}")"
          printf '%s\n' '/' '/docs' > "${RUNNER_TEMP}/appsurface-docs-seeds.txt"

          dotnet run --project Cli/ForgeTrust.AppSurface.Cli/ForgeTrust.AppSurface.Cli.csproj -c Release -- \
            docs export \
            --repo . \
            --mode cdn \
            --seeds "${RUNNER_TEMP}/appsurface-docs-seeds.txt" \
            --output "${docs_exact_tree}" \
            --public-origin https://forge-trust.com \
            --startup-timeout-seconds 30 \
            --strict

          jq -n \
            --arg version "${PACKAGE_VERSION}" \
            --arg exactTreePath "${docs_exact_tree_path}" \
            --arg releaseManifestSha256 "${docs_release_manifest_sha256}" \
            '{
              recommendedVersion: $version,
              versions: [
                {
                  version: $version,
                  label: $version,
                  summary: ("Stable AppSurface release " + $version),
                  exactTreePath: $exactTreePath,
                  releaseManifestSha256: $releaseManifestSha256,
                  supportState: "Current",
                  visibility: "Public",
                  advisoryState: "None"
                }
              ]
            }' > "${docs_release_root}/versions.json"

          dotnet run --project Cli/ForgeTrust.AppSurface.Cli/ForgeTrust.AppSurface.Cli.csproj -c Release -- \
            docs verify-archive \
            --catalog "${docs_release_root}/versions.json" \
            --version "${PACKAGE_VERSION}" \
            --trusted-release-root "${docs_release_root}"

          ./eng/release check \
            --version "${PACKAGE_VERSION}" \
            --allow-existing-targets \
            --fail-on-warnings \
            --docs-catalog "${docs_release_root}/versions.json" \
            --docs-trusted-release-root "${docs_release_root}"

      - name: Upload stable docs proof diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: appsurface-stable-docs-proof-${{ needs.validate-tag.outputs.package-version }}
          path: |
            ${{ runner.temp }}/appsurface-stable-docs-${{ needs.validate-tag.outputs.package-version }}/versions.json
            ${{ runner.temp }}/appsurface-stable-docs-${{ needs.validate-tag.outputs.package-version }}/**/.appsurface-docs-release-manifest.json
            ${{ runner.temp }}/appsurface-stable-docs-${{ needs.validate-tag.outputs.package-version }}/**/.appsurface-docs-route-manifest.json
          if-no-files-found: warn

  publish-nuget:
    needs:
      - validate-tag
      - validate-release-environment
      - pack-and-verify
      - prove-docs-archive
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      # Required for NuGet trusted publishing to request an OIDC token.
      id-token: write
    environment: nuget-stable

    steps:
      - name: Checkout tag commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.validate-tag.outputs.tag-commit }}
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            10.0.x

      - name: Download validated package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: appsurface-stable-packages-${{ needs.validate-tag.outputs.package-version }}
          path: ${{ runner.temp }}/package-artifacts

      - name: Validate NuGet trusted publishing configuration
        env:
          NUGET_USER: ${{ vars.NUGET_USER }}
        run: |
          set -euo pipefail

          if [[ -z "${NUGET_USER}" ]]; then
            echo "Environment or repository variable 'NUGET_USER' must contain the nuget.org profile name used by the trusted publishing policy." >&2
            exit 1
          fi

      - name: Request NuGet trusted publishing token
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish packages to NuGet
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          PACKAGE_ARTIFACTS: ${{ runner.temp }}/package-artifacts
        run: |
          dotnet run --project tools/ForgeTrust.AppSurface.PackageIndex/ForgeTrust.AppSurface.PackageIndex.csproj -- \
            publish-stable \
            --artifacts-input "${PACKAGE_ARTIFACTS}" \
            --artifact-manifest "${PACKAGE_ARTIFACTS}/package-artifact-manifest.json" \
            --publish-log "${PACKAGE_ARTIFACTS}/package-publish-log.md"

      - name: Upload publish ledger
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: appsurface-stable-publish-log-${{ needs.validate-tag.outputs.package-version }}
          path: ${{ runner.temp }}/package-artifacts/package-publish-log.md
          if-no-files-found: warn

  smoke-install:
    needs:
      - validate-tag
      - publish-nuget
    runs-on: ubuntu-latest
    environment:
      name: nuget-stable-smoke
      deployment: false
    timeout-minutes: 70

    steps:
      - name: Checkout tag commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.validate-tag.outputs.tag-commit }}
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            10.0.x

      - name: Download validated package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: appsurface-stable-packages-${{ needs.validate-tag.outputs.package-version }}
          path: ${{ runner.temp }}/package-artifacts

      - name: Smoke install published packages
        env:
          PACKAGE_ARTIFACTS: ${{ runner.temp }}/package-artifacts
          SMOKE_WORK_DIR: ${{ runner.temp }}/package-smoke
        run: |
          dotnet run --project tools/ForgeTrust.AppSurface.PackageIndex/ForgeTrust.AppSurface.PackageIndex.csproj -- \
            smoke-install \
            --artifact-manifest "${PACKAGE_ARTIFACTS}/package-artifact-manifest.json" \
            --smoke-work-dir "${SMOKE_WORK_DIR}" \
            --smoke-report "${SMOKE_WORK_DIR}/package-smoke-report.md"

      - name: Upload smoke install report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: appsurface-stable-smoke-${{ needs.validate-tag.outputs.package-version }}
          path: ${{ runner.temp }}/package-smoke/package-smoke-report.md
          if-no-files-found: warn
