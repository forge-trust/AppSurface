# .github/workflows/benchmarks.yml
name: Benchmarks

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  NUGET_XMLDOC_MODE: skip
  TERM: xterm

on:
  push:
    branches: [ "main", "benchmarks" ]
    paths-ignore:
      - '**/*.gitattributes'
      - '**/*.gitignore'
      - '**/*.md'
  workflow_dispatch: {}

permissions: {}

jobs:
  run-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read  # for this repo
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            10.0.x

      - name: Run benchmarks (JSON)
        run: |
          dotnet run --project 'benchmarks/AppSurfaceBenchmarks/AppSurfaceBenchmarks.csproj' -c Release -- --filter '*'

      - name: Publish BenchmarkDotNet artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: artifacts
          path: ./BenchmarkDotNet.Artifacts/results/*
          if-no-files-found: error

      - name: Get repository name
        id: get-repo-name
        shell: pwsh
        run: |
          $repoName = ${env:GITHUB_REPOSITORY}.Split("/")[-1]
          "repo-name=${repoName}" >> ${env:GITHUB_OUTPUT}

      - name: Publish results
        uses: martincostello/benchmarkdotnet-results-publisher@b1e7cf14565f479f7d7628c89ca3936142fa6d67 # v2.0.4
        with:
          branch: ${{ github.ref_name }}
          comment-on-threshold: true
          name: AppSurface
          output-file-path: '${{ steps.get-repo-name.outputs.repo-name }}/data.json'
          repo: '${{ github.repository_owner }}/benchmarks'
          repo-token: ${{ secrets.BENCHMARKS_TOKEN }}
