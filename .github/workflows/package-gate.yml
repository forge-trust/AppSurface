name: package-gate.yml

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: |
            10.0.x

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: Web/pnpm-lock.yaml

      - name: Verify web assets
        run: |
          pnpm --dir Web install --frozen-lockfile
          pnpm --dir Web run assets:typecheck
          pnpm --dir Web run assets:test
          pnpm --dir Web run assets:verify

      - name: Restore with isolated NuGet cache
        env:
          NUGET_PACKAGES: ${{ runner.temp }}/nuget-packages
        run: |
          dotnet restore ForgeTrust.AppSurface.slnx --configfile NuGet.package-gate.config

      - name: Build release packages
        env:
          NUGET_PACKAGES: ${{ runner.temp }}/nuget-packages
        run: |
          dotnet build ForgeTrust.AppSurface.slnx --configuration Release --no-restore

      - name: Validate package manifest gate
        env:
          NUGET_PACKAGES: ${{ runner.temp }}/nuget-packages
        run: |
          dotnet run --project tools/ForgeTrust.AppSurface.PackageIndex/ForgeTrust.AppSurface.PackageIndex.csproj --configuration Release --no-build -- gate

      - name: Pack release artifacts
        env:
          NUGET_PACKAGES: ${{ runner.temp }}/nuget-packages
        run: |
          dotnet pack ForgeTrust.AppSurface.slnx --configuration Release --no-build --output "${{ runner.temp }}/appsurface-packages"
