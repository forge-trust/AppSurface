name: Release Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v.
        required: true
      tag:
        description: Annotated tag to publish, for example v0.1.0-preview.1.
        required: true
      base-ref:
        description: Branch or ref that must contain the tag commit.
        required: false
        default: main

concurrency:
  group: release-publish-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    if: ${{ github.repository == 'forge-trust/AppSurface' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            10.0.x

      - name: Fetch release tag and base
        env:
          TAG: ${{ inputs.tag }}
          BASE_REF: ${{ inputs.base-ref }}
        run: |
          set -euo pipefail
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
          git fetch origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"

      - name: Validate tag-bound release evidence
        id: release
        env:
          VERSION: ${{ inputs.version }}
          TAG: ${{ inputs.tag }}
          BASE_REF: ${{ inputs.base-ref }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ./eng/release publish \
            --version "${VERSION}" \
            --tag "${TAG}" \
            --base-ref "${BASE_REF}" \
            --dry-run \
            --github-output "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          TITLE: AppSurface ${{ steps.release.outputs.tag }}
          NOTES_FILE: ${{ steps.release.outputs.notes_file }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          set -euo pipefail
          args=(release create "${TAG}" --verify-tag --title "${TITLE}" --notes-file "${NOTES_FILE}")
          if [[ "${PRERELEASE}" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"
