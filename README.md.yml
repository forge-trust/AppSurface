title: AppSurface
summary: AppSurface gives .NET teams a modular startup pipeline for web, console, and distributed apps. Start with the pillar you need, then drill into concrete examples and API reference.
featured_page_groups:
  - intent: evaluate-appsurface
    label: Decide if AppSurface fits
    summary: Start here when you need to know whether AppSurface is better than plain ASP.NET Core startup code for your app or team.
    order: 1
    pages:
      - question: Should my team use AppSurface?
        path: start-here/should-i-use-appsurface.md
        supporting_copy: Compare plain ASP.NET Core with AppSurface's module model before installing extra packages.
        order: 10
      - question: What is the evaluator path?
        path: start-here/appsurface-evaluator.md
        supporting_copy: Follow the shortest reading path for team leads, managers, architects, and senior developers evaluating startup standardization.
        order: 20
  - intent: prove-first-service
    label: Prove the first service
    summary: Run the smallest web proof, then inspect the first reusable startup concern.
    order: 2
    pages:
      - question: Can I run it in minutes?
        path: start-here/first-success-path.md
        supporting_copy: Start with the existing web example and verify the first response before reading deeper docs.
        order: 10
      - question: What does a module buy me?
        path: guides/from-program-cs-to-module.md
        supporting_copy: See browser status and production error page setup move from scattered startup policy to a named AppSurface concern.
        order: 20
  - intent: recover-and-read
    label: Recover and read the vocabulary
    summary: Use these when the first run or first module does not behave as expected.
    order: 3
    pages:
      - question: Why did startup or module composition fail?
        path: troubleshooting/startup-and-modules.md
        supporting_copy: Diagnose module registration, dependency, configuration, route, static asset, docs surface, and package-choice mistakes.
        order: 10
      - question: What do the core terms mean?
        path: concepts/glossary.md
        supporting_copy: Learn the vocabulary used by AppSurface package docs and examples.
        order: 20
  - intent: choose-package
    label: Choose a package
    summary: Start here when you need the smallest useful install path for a new app.
    order: 5
    pages:
      - question: Which AppSurface package should I install first?
        path: packages/README.md
        supporting_copy: Start with the generated package chooser, then add only the optional modules your app actually needs.
        order: 10
  - intent: evaluate-release
    label: Evaluate release risk
    summary: Use these routes when you need to decide whether current changes are safe to adopt.
    order: 10
    pages:
      - question: What is shipping next, and how risky is the upgrade?
        path: releases/README.md
        supporting_copy: Start with the public release hub, then drill into the unreleased proof artifact, changelog, and pre-1.0 upgrade policy.
        order: 10
  - intent: build-docs
    label: Build docs with RazorDocs
    summary: Use this path when you want to host authored docs and generated API reference from your own repository.
    order: 15
    pages:
      - question: How do I use RazorDocs in my own repository?
        path: Web/ForgeTrust.AppSurface.Docs/use-razordocs.md
        supporting_copy: Follow the consumer landing page for the package thesis, host shape, authoring model, and adoption checklist.
        order: 10
  - intent: see-it-working
    label: See it working
    summary: Follow concrete application paths before drilling into reference material.
    order: 20
    pages:
      - question: Show me a working app, not just abstractions
        path: examples/web-app/README.md
        supporting_copy: Walk through a minimal ASP.NET Core app that uses AppSurface modules end to end.
        order: 10
      - question: How does this fit distributed systems?
        path: Aspire/README.md
        supporting_copy: See how the same modular approach extends into .NET Aspire and service-default composition.
        order: 20
      - question: What about CLI and worker flows?
        path: Console/README.md
        supporting_copy: Follow the console tooling for commands, critical services, and shared startup patterns.
        order: 30
