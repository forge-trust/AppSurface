audits:
  - id: cli-dotnet-tool-dependency-closure
    package_id: ForgeTrust.AppSurface.Cli
    applies_to:
      - tools/net10.0/any/*.dll
      - tools/net10.0/any/*/*.dll
      - tools/net10.0/any/runtimes/**/*.dll
    matched_rule: dotnet tool dependency closure
    evidence_kind: dotnet_tool_dependency_closure
    source_paths:
      - Cli/ForgeTrust.AppSurface.Cli/ForgeTrust.AppSurface.Cli.csproj
      - Cli/ForgeTrust.AppSurface.Cli/packages.lock.json
      - Directory.Packages.props
    reason: The .NET tool package carries SDK-produced dependency assemblies from the CLI project restore graph. The lock file records resolved package versions and content hashes; hand-copied tool payloads remain separately noticed.
    reviewed_on: 2026-06-07
    source: dotnet pack dependency closure from Cli/ForgeTrust.AppSurface.Cli/packages.lock.json
    revalidate_when: CLI package references, project references, target framework, package lock, or dotnet tool packing layout changes.
  - id: razorwire-generated-browser-assets
    package_id: ForgeTrust.RazorWire
    applies_to:
      - staticwebassets/razorwire/razorwire.js
      - staticwebassets/razorwire/razorwire.islands.js
      - staticwebassets/razorwire/behavior-kit.js
      - staticwebassets/razorwire/page-navigation.js
      - staticwebassets/razorwire/section-copy.js
      - staticwebassets/razorwire/form-interactions.js
    matched_rule: embedded generated browser assets
    evidence_kind: generated_first_party
    source_paths:
      - Web/ForgeTrust.RazorWire/assets/src/razorwire.ts
      - Web/ForgeTrust.RazorWire/assets/src/razorwire.islands.ts
      - Web/ForgeTrust.RazorWire/assets/src/behavior-kit.ts
      - Web/ForgeTrust.RazorWire/assets/src/page-navigation.ts
      - Web/ForgeTrust.RazorWire/assets/src/section-copy.ts
      - Web/ForgeTrust.RazorWire/assets/src/form-interactions.ts
      - Web/ForgeTrust.RazorWire/assets/scripts/build.mjs
      - Web/ForgeTrust.RazorWire/assets/scripts/verify-generated.mjs
      - Web/ForgeTrust.RazorWire/test/generated-assets.test.mjs
    generated_paths:
      - Web/ForgeTrust.RazorWire/wwwroot/razorwire/razorwire.js
      - Web/ForgeTrust.RazorWire/wwwroot/razorwire/razorwire.islands.js
      - Web/ForgeTrust.RazorWire/wwwroot/razorwire/behavior-kit.js
      - Web/ForgeTrust.RazorWire/wwwroot/razorwire/page-navigation.js
      - Web/ForgeTrust.RazorWire/wwwroot/razorwire/section-copy.js
      - Web/ForgeTrust.RazorWire/wwwroot/razorwire/form-interactions.js
    reason: RazorWire embeds generated browser runtime assets built from first-party TypeScript sources. Pack runs RWPACK001 generated asset verification before nuspec generation.
    reviewed_on: 2026-06-07
    source: Web/ForgeTrust.RazorWire/ForgeTrust.RazorWire.csproj VerifyRazorWireGeneratedAssetsForPack
    revalidate_when: RazorWire assets/src, assets/scripts, wwwroot/razorwire, or VerifyRazorWireGeneratedAssetsForPack changes.
