    includes: AppSurfaceCachingModule, IMemo or Memo helpers, and cache policy primitives on top of Microsoft.Extensions.Caching.Memory.
    does_not_include: Distributed caching infrastructure, web hosting, or configuration binding.
    start_here_path: Caching/ForgeTrust.AppSurface.Caching/README.md
