    publish_decision: publish
    release_status: public_preview
    commercial_status: commercial_ready
    release_notes_path: releases/unreleased.md
    order: 20
    use_when: Add this when your AppSurface modules need strongly typed configuration primitives instead of ad hoc configuration lookups.
    includes: AppSurfaceConfigModule, typed config objects, configuration providers, source-aware audit reports, and explicit configuration access patterns.
    does_not_include: Web hosting, UI docs, caching, or a separate secret-management system.
    start_here_path: Config/ForgeTrust.AppSurface.Config/README.md
    expected_dependency_package_ids:
      - ForgeTrust.AppSurface.Core
