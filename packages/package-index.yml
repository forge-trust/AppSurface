    classification: public
    publish_decision: publish
    release_status: public_preview
    commercial_status: commercial_ready
    release_notes_path: releases/unreleased.md
    order: 10
    use_when: Install this directly only when you are authoring reusable AppSurface modules or host integrations instead of starting from a web, console, or Aspire package.
    includes: Core module abstractions, dependency graph orchestration, AppSurfaceStartup, and StartupContext.
    does_not_include: ASP.NET Core hosting, CliFx command hosting, Aspire app-model helpers, or optional integrations.
    start_here_path: ForgeTrust.AppSurface.Core/README.md
